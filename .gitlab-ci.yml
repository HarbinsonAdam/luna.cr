stages:
  - lint
  - test
  - release

include:
  - project: "harbinson-dev/ci-templates"
    ref: "main"
    file:
      - "/templates/crystal.yml"
      - "/templates/release-tags.yml"

# ----------------------------
# LINT (main + MRs)
# ----------------------------
ameba:
  stage: lint
  extends: .ameba_lint
  rules:
    - if: '$CI_MERGE_REQUEST_ID'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ----------------------------
# TESTS (main + MRs)
# ----------------------------
crystal_spec:
  stage: test
  extends: .crystal_spec
  needs:
    - ameba
  before_script:
    - apk add --no-cache sqlite-dev postgresql-dev mariadb-connector-c-dev
  rules:
    - if: '$CI_MERGE_REQUEST_ID'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ----------------------------
# RELEASE TAGS (main only)
# These create a tag and start a new tag pipeline
# ----------------------------
tag_patch:
  stage: release
  extends: .tag_patch
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_TAG == null'
      when: manual

tag_minor:
  stage: release
  extends: .tag_minor
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_TAG == null'
      when: manual

tag_major:
  stage: release
  extends: .tag_major
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_TAG == null'
      when: manual
